name: Build PHOBOS Launcher

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release after build'
        type: boolean
        default: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label:    win32-x64
            runner:   windows-latest
            cmd:      build:win
            artifact: phobos-launcher-win32-x64
            glob:     'dist/*.exe'

          - label:    darwin-universal
            runner:   macos-14
            cmd:      build:mac
            artifact: phobos-launcher-darwin
            glob:     'dist/*.dmg'

          - label:    linux-x64
            runner:   ubuntu-latest
            cmd:      build:linux
            artifact: phobos-launcher-linux-x64
            glob:     'dist/*.{AppImage,deb}'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        run: ls -la dist/
        shell: bash

      - name: Upload artifacts (Windows)
        if: matrix.label == 'win32-x64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.exe
          retention-days: 7

      - name: Upload artifacts (macOS)
        if: matrix.label == 'darwin-universal'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.dmg
          retention-days: 7

      - name: Upload artifacts (Linux)
        if: matrix.label == 'linux-x64'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (github.event_name == 'workflow_dispatch' && inputs.release))
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   PHOBOS Launcher ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files:                  release-artifacts/**/*
          fail_on_unmatched_files: false
